<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAUTA MED - Registro</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="auth-container">

    <div class="auth-visual">
      <a href="index.html" class="back-home">&larr; Volver al inicio</a>
      <div class="visual-content">
        <img src="assets/amauta-logo.png" alt="AMAUTA MED">
        <h2>Unete a la<br><span>Nueva Era</span></h2>
        <p>Crea tu cuenta y accede a herramientas clinicas pensadas para estudiantes y profesionales de salud.</p>
      </div>
    </div>

    <div class="auth-form-wrapper">
      <div class="auth-form-box">

        <a href="index.html" class="back-home" style="display:none;">&larr; Volver</a>

        <div class="auth-header">
          <h1>Crear una Cuenta</h1>
          <p>Plan seleccionado: <strong id="selected-plan">Estudiante de Medicina</strong></p>
        </div>

        <form class="auth-form" action="chatbot.html" method="post">
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
            </div>

            <div class="form-group">
              <label for="apellidos">Apellidos</label>
              <input type="text" id="apellidos" name="apellidos" placeholder="Perez" required>
            </div>
          </div>

          <div class="form-group">
            <label for="username">Nombre de usuario</label>
            <input type="text" id="username" name="username" required>
          </div>

          <div class="form-group">
            <label for="email">Correo Electronico</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password">Contrasena</label>
              <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirmar Contrasena</label>
              <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
          </div>

          <div class="form-options" style="justify-content: flex-start; gap: 10px;">
            <label>
              <input type="checkbox" required> Acepto los <a href="#">Terminos</a> y la <a href="#">Privacidad</a>.
            </label>
          </div>

          <button type="submit" class="btn-auth">Completar Registro</button>
        </form>

        <div class="auth-footer">
          Ya tienes una cuenta? <a href="acceso.html">Inicia sesion</a>
        </div>

      </div>
    </div>

  </div>

  <script>
    if (window.innerWidth <= 768) {
      document.querySelector('.auth-form-box .back-home').style.display = 'inline-flex';
    }

    (function () {
      function getParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      const role = getParam('role') || getParam('rol') || 'estudiante';
      const selectedPlan = document.getElementById('selected-plan');

      if (selectedPlan) {
        selectedPlan.textContent = role === 'medico' ? 'Medico Colegiado' : 'Estudiante de Medicina';
      }

      const form = document.querySelector('.auth-form');
      if (form) {
        form.addEventListener('submit', function (event) {
          const password = document.getElementById('password');
          const confirmPassword = document.getElementById('confirm-password');

          if (password && confirmPassword && password.value !== confirmPassword.value) {
            event.preventDefault();
            alert('Las contrasenas no coinciden.');
          }
        });
      }

    })();
  </script>
</body>
</html>
