<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAUTA MED - Registro</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="auth-container">
    
    <!-- Lado Izquierdo (Visual) -->
    <div class="auth-visual">
      <a href="index.html" class="back-home">← Volver al inicio</a>
      <div class="visual-content">
        <img src="assets/amauta-logo.png" alt="AMAUTA MED">
        <h2>Únete a la<br><span>Nueva Era</span></h2>
        <p>Crea tu cuenta hoy y democratiza tu acceso a herramientas clínicas avanzadas, basadas en la realidad de la medicina en Perú.</p>
      </div>
    </div>

    <!-- Lado Derecho (Formulario) -->
    <div class="auth-form-wrapper">
      <div class="auth-form-box">
        
        <a href="index.html" class="back-home" style="display:none;">← Volver</a>
        
        <div class="auth-header">
          <h1>Crear una Cuenta</h1>
          <p>Completa tus datos para comenzar tu experiencia.</p>
        </div>

        <form class="auth-form" action="chatbot.html">
          
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" placeholder="Juan" required>
            </div>
            <div class="form-group">
              <label for="apellidos">Apellidos</label>
              <input type="text" id="apellidos" placeholder="Pérez" required>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="juan.perez@ejemplo.com" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="perfil">Perfil</label>
              <select id="perfil" required>
                <option value="" disabled selected>Selecciona tu perfil</option>
                <option value="estudiante">Estudiante de Medicina</option>
                <option value="medico">Médico Colegiado</option>
              </select>
            </div>
            <div class="form-group">
              <label for="cmp">CMP (Opcional)</label>
              <input type="text" id="cmp" placeholder="N° de Colegiatura">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
          </div>

          <div class="form-options" style="justify-content: flex-start; gap: 10px;">
            <label>
              <input type="checkbox" required> Acepto los <a href="#">Términos</a> y la <a href="#">Privacidad</a>.
            </label>
          </div>

          <button type="submit" class="btn-auth">Completar Registro</button>
        </form>

        <div class="auth-footer">
          ¿Ya tienes una cuenta? <a href="acceso.html">Inicia sesión</a>
        </div>

      </div>
    </div>
    
  </div>

  <script>
    // Mostrar link de volver si en móvil
    if(window.innerWidth <= 768) {
      document.querySelector('.auth-form-box .back-home').style.display = 'inline-flex';
    }
  </script>
</body>
</html>
