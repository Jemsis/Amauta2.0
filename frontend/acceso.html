<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAUTA MED - Acceso</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="auth-container">
    
    <!-- Lado Izquierdo (Visual) -->
    <div class="auth-visual">
      <a href="index.html" class="back-home">← Volver al inicio</a>
      <div class="visual-content">
        <img src="assets/amauta-logo.png" alt="AMAUTA MED">
        <h2>Sabiduría y<br><span>Excelencia Médica</span></h2>
        <p>Inicia sesión para continuar potenciando tu praxis con la inteligencia clínica de AMAUTA MED.</p>
      </div>
    </div>

    <!-- Lado Derecho (Formulario) -->
    <div class="auth-form-wrapper">
      <div class="auth-form-box">
        
        <a href="index.html" class="back-home" style="display:none;">← Volver</a>
        
        <div class="auth-header">
          <h1>Bienvenido de vuelta</h1>
          <p>Ingresa tus credenciales para acceder a tu cuenta.</p>
        </div>

        <form class="auth-form" action="chatbot.html">
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="dr.apellido@ejemplo.com" required>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <div class="form-options">
            <label>
              <input type="checkbox"> Recordarme
            </label>
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-auth">Ingresar a AMAUTA MED</button>
        </form>

        <div class="auth-footer">
          ¿Aún no tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>

      </div>
    </div>
    
  </div>

  <script>
    // Mostrar link de volver si en móvil
    if(window.innerWidth <= 768) {
      document.querySelector('.auth-form-box .back-home').style.display = 'inline-flex';
    }
  </script>
</body>
</html>
